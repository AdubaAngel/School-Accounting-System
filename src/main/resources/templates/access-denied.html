<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Access Denied - School Accounting</title>
    <link rel="stylesheet" th:href="@{/css/error.css}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="error-container">
        <div class="error-card access-denied">
            <div class="error-icon">🚫</div>
            <h2>Access Denied</h2>
            <div class="error-code">HTTP 403</div>
            <p>You do not have permission to access this page.<br>Please contact your administrator if you believe this is a mistake.</p>
            <a href="/dashboard" class="back-button">← Back to Dashboard</a>
            <div class="additional-info">
                <p>Need help? <a href="/contact">Contact Support</a> or <a href="/logout">Login with different account</a></p>
            </div>
        </div>
    </div>
</body>
</html>
