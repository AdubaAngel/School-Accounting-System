<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Accounting · Secure Login</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="login-container">
        <div class="brand-header">
            <h1>
                <span>📚</span> School Accounting
            </h1>
            <p>Smart finance · transparent management</p>
            <div class="school-badge">secure portal</div>
        </div>

        <div class="form-wrapper">
            <form th:action="@{/login}" method="post" class="login-form">
                <div class="input-group">
                    <label for="username">Username</label>
                    <input type="text" 
                           id="username" 
                           name="username" 
                           class="input-field" 
                           placeholder="staff ID or email" 
                           autocomplete="username"
                           required>
                </div>

                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" 
                           id="password" 
                           name="password" 
                           class="input-field" 
                           placeholder="••••••••" 
                           autocomplete="current-password"
                           required>
                </div>

                <button type="submit" class="login-btn">Sign in →</button>

                <div class="form-footer">
                    <a href="#" class="helper-link">Forgot password?</a>
                    <span class="sep">•</span>
                    <a href="#" class="helper-link">Contact support</a>
                </div>
            </form>

            <div th:if="${param.error}" class="alert-message error" role="alert">
                <span class="alert-icon">⚠️</span>
                <span>Invalid username or password</span>
            </div>
            
            <div th:if="${param.logout}" class="alert-message success" role="alert">
                <span class="alert-icon">✓</span>
                <span>You have been logged out</span>
            </div>
        </div>
    </div>
</body>
</html>
