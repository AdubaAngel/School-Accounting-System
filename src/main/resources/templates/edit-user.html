<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit User - School Accounting</title>
    <link rel="stylesheet" th:href="@{/css/user-management.css}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="form-container">
        <h2>Edit Staff User</h2>
        
        <form th:action="@{/users/update/{id}(id=${user.id})}" 
              th:object="${user}" 
              method="post">
            
            <div class="form-group">
                <label for="username">Username</label>
                <input id="username" type="text" th:value="${user.username}" readonly disabled title="Username"/>
                <small>Username cannot be changed</small>
            </div>
            
            <div class="form-group">
                <label for="fullName">Full Name</label>
                <input type="text" 
                       id="fullName" 
                       th:field="*{fullName}" 
                       required/>
            </div>
            
            <div class="form-group">
                <label for="role">Role</label>
                <select id="role" name="role" required>
                    <option th:each="role : ${roles}" 
                            th:value="${role}" 
                            th:text="${role}"
                            th:selected="${user.role == role}">
                    </option>
                </select>
                <small>ACCOUNTANT: Can record payments | AUDITOR: Read-only access</small>
            </div>
            
            <div class="form-group">
                <label>Password</label>
                <input type="password" placeholder="Leave blank to keep current password"/>
                <small>Password reset feature coming soon</small>
            </div>
            
            <div class="button-group">
                <button type="submit">💾 Save Changes</button>
                <a href="/users/list" class="cancel-btn">Cancel</a>
            </div>
        </form>
        
        <a href="/users/list" class="back-link">← Back to Users List</a>
    </div>
</body>
</html>
